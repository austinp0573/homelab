[defaults]
inventory = ./inventories/homelab/hosts.yml
roles_path = ./roles
remote_user = ansible
host_key_checking = False
stdout_callback = default
result_format = yaml
deprecation_warnings = False
retry_files_enabled = False
interpreter_python = auto_silent

[ssh_connection]
pipelining = True
scp_if_ssh = True
scp_extra_args = -O