---
- name: Create secure WireGuard configuration directory
  ansible.builtin.file:
    path: "{{ wireguard_config_dir }}"
    state: directory
    mode: "0700"

- name: Generate WireGuard interface configuration
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: "{{ wireguard_config_path }}"
    mode: "0600"
  no_log: true
  notify: Restart wireguard
