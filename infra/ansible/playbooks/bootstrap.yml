---
# legacy debian bootstrap entry point.
# playbooks/system/bootstrap.yml for new work.
# run once against a new debian-family server.

- name: Bootstrap Ansible Service Account
  hosts: all
  gather_facts: no # Don't gather facts because python might not be installed yet
  pre_tasks:
    - name: Ensure python3 is installed for Ansible
      raw: test -e /usr/bin/python3 || (apt -y update && apt install -y python3)
      become: yes
      changed_when: false
    - name: Gather Facts
      setup:
  roles:
    - bootstrap
