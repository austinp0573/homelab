---
- name: Install base system packages
  ansible.builtin.apt:
    name:
      - vim-nox
      - figlet
      - fastfetch
      - git
      - curl
      - fdupes
      - gnupg
      - apt-transport-https
    state: present
    update_cache: yes

- name: Setup Ookla Speedtest Repository
  block:
    - name: Download Ookla repository installation script
      ansible.builtin.get_url:
        url: https://packagecloud.io/install/repositories/ookla/speedtest-cli/script.deb.sh
        dest: /tmp/speedtest_install.sh
        mode: '0700'

    - name: Execute Ookla repository script
      ansible.builtin.shell: /tmp/speedtest_install.sh
      args:
        creates: /etc/apt/sources.list.d/ookla_speedtest-cli.list

    - name: Install official speedtest cli
      ansible.builtin.apt:
        name: speedtest
        state: present
        update_cache: yes

- name: Deploy .bash_aliases to root
  ansible.builtin.copy:
    src: .bash_aliases
    dest: /root/.bash_aliases
    owner: root
    group: root
    mode: '0644'

- name: Configure .bashrc to load aliases
  ansible.builtin.blockinfile:
    path: /root/.bashrc
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    block: |
      if [ -f ~/.bash_aliases ]; then
          . ~/.bash_aliases
      fi

- name: Install custom Figlet fonts
  block:
    - name: Clone figlet fonts repository
      ansible.builtin.git:
        repo: 'https://github.com/xero/figlet-fonts'
        dest: /tmp/figlet-fonts
        depth: 1

    - name: Ensure system figlet directory exists with correct permissions
      ansible.builtin.file:
        path: /usr/share/figlet
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Copy fonts to system directory
      ansible.builtin.copy:
        remote_src: true
        src: /tmp/figlet-fonts/
        dest: /usr/share/figlet/
        owner: root
        group: root
        mode: '0644'

    - name: Ensure all subdirectories are accessible
      ansible.builtin.file:
        path: /usr/share/figlet
        state: directory
        recurse: yes
        mode: '0755'

    - name: Remove git metadata from system folder
      ansible.builtin.file:
        path: /usr/share/figlet/.git
        state: absent

    - name: Rename fonts to remove spaces
      ansible.builtin.shell: |
        for f in /usr/share/figlet/*.flf; do 
          mv "$f" "${f// /-}" 2>/dev/null || true
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Remove duplicate FIGlet fonts
      ansible.builtin.command:
        cmd: fdupes -rdN .
        chdir: /usr/share/figlet
      register: fdupes_result
      changed_when: "'is a duplicate' in fdupes_result.stdout or fdupes_result.stdout != ''"

  always:
    - name: Cleanup temporary font files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/figlet-fonts
        - /tmp/speedtest_install.sh

- name: Manage MOTD Structure
  block:
    - name: Ensure MOTD directory exists
      ansible.builtin.file:
        path: /etc/update-motd.d
        state: directory
        mode: '0755'

    - name: Remove old 10-uname script
      ansible.builtin.file:
        path: /etc/update-motd.d/10-uname
        state: absent

    - name: Disable static MOTD
      ansible.builtin.copy:
        content: ""
        dest: /etc/motd
        mode: '0644'

    - name: Deploy dynamic MOTD script (10-basic-info)
      ansible.builtin.copy:
        dest: /etc/update-motd.d/10-basic-info
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/bin/bash
          SEPARATOR=$(printf -- '-%.0s' {1..30})
          echo -e "\n\n"
          fastfetch --pipe false
          echo ""
          echo $HOSTNAME | /usr/bin/figlet -f /usr/share/figlet/ANSI-Shadow.flf
          echo $(whoami) | /usr/bin/figlet -f /usr/share/figlet/ANSI-Shadow.flf
          echo ""
          echo $SEPARATOR
          date
          echo $SEPARATOR
          echo ""

- name: Enable global MOTD trigger for all users
  ansible.builtin.copy:
    dest: /etc/profile.d/custom-motd.sh
    owner: root
    group: root
    mode: '0644'
    content: |
      # Only run for interactive shells (prevents breaking scp/sftp)
      if [[ $- == *i* ]]; then
          if [ -x /etc/update-motd.d/10-basic-info ]; then
              /etc/update-motd.d/10-basic-info
          fi
      fi

- name: Ensure dietpi user has SSH access
  ansible.builtin.authorized_key:
    user: dietpi
    state: present
    key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
  become: yes

- name: Harden SSH Configuration
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Disable password-based login
      PasswordAuthentication no
      # Only allow root login via SSH keys
      PermitRootLogin prohibit-password
      # Ensure pubkey auth is on
      PubkeyAuthentication yes
  become: yes
  notify: Restart SSH