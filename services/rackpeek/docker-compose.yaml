services:
  rackpeek:
    image: aptacode/rackpeek:latest
    container_name: rackpeek
    ports:
      - "8001:8080"
    volumes:
      - ./data:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8001 | grep -q 'rackpeek' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
