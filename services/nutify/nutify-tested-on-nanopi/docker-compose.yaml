services:
  nut:
    image: dartsteven/nutify:latest-raspberrypi5-arm64
    container_name: Nutify
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_RAWIO
      - MKNOD
    devices:
      - /dev/bus/usb:/dev/bus/usb:rwm
      - /dev/hidraw0:/dev/hidraw0:rwm
    device_cgroup_rules:
      - 'c 189:* rwm'
    volumes:
      - /run/udev:/run/udev:ro
      - ./Nutify/etc/nut:/etc/nut
      - ./Nutify/logs:/app/nutify/logs
      - ./Nutify/instance:/app/nutify/instance
      - ./Nutify/ssl:/app/ssl
    environment:
      - SECRET_KEY=test1234567890
      - UDEV=1
      - LOG=true
      - LOG_LEVEL=INFO
      - LOG_WERKZEUG=true
      - ENABLE_LOG_STARTUP=Y
      - SSL_ENABLED=false
    # MOVED OUT OF ENVIRONMENT BLOCK
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "3493:3493"
      - "5050:5050"
      - "443:443"
    restart: always
    user: root
